<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruleta de Comidas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAFAF8;
      --surface: #FFFFFF;
      --border: rgba(0,0,0,0.10);
      --border-md: rgba(0,0,0,0.18);
      --text-primary: #1A1A18;
      --text-secondary: #6B6B67;
      --text-muted: #A3A39E;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 22px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      letter-spacing: -1px;
      color: var(--text-primary);
    }
    header p {
      font-size: 15px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 2rem;
      justify-content: center;
      padding: 0 1rem 2.5rem;
      flex-wrap: wrap;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .filter-group label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-muted);
    }
    .pill-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pill {
      padding: 7px 16px;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border-md);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .pill:hover { background: #F0F0EC; color: var(--text-primary); }
    .pill.active-tiempo { background: #1D9E75; color: #fff; border-color: #1D9E75; }
    .pill.active-facil   { background: #639922; color: #fff; border-color: #639922; }
    .pill.active-medio   { background: #BA7517; color: #fff; border-color: #BA7517; }
    .pill.active-dificil { background: #A32D2D; color: #fff; border-color: #A32D2D; }

    /* MAIN LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2rem;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* WHEEL */
    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .wheel-wrap {
      position: relative;
      width: 340px;
      height: 340px;
    }
    .pointer {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 24px solid var(--text-primary);
      z-index: 10;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }
    #wheelCanvas {
      border-radius: 50%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .spin-btn {
      padding: 13px 44px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border-radius: 100px;
      border: none;
      background: var(--text-primary);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .spin-btn:hover { opacity: 0.82; }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* RESULT */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 340px;
    }
    .result-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-muted);
    }
    .result-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F5F5F0;
      border-radius: var(--radius-lg);
    }
    .result-placeholder p {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 2rem 1.5rem;
      line-height: 1.6;
    }
    .result-img {
      width: 100%;
      height: 190px;
      border-radius: var(--radius-lg);
      object-fit: cover;
      display: block;
      background: #F0F0EC;
    }
    .img-fallback {
      width: 100%;
      height: 190px;
      border-radius: var(--radius-lg);
      background: #F0F0EC;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .img-fallback span:first-child {
      font-size: 32px;
    }
    .img-fallback span:last-child {
      font-size: 12px;
      color: var(--text-muted);
    }
    .result-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .badge-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 100px;
    }
    .badge-facil   { background: #EAF3DE; color: #3B6D11; }
    .badge-medio   { background: #FAEEDA; color: #854F0B; }
    .badge-dificil { background: #FCEBEB; color: #A32D2D; }
    .badge-tiempo  { background: #F0F0EC; color: var(--text-secondary); }

    /* RESPONSIVE */
    @media (max-width: 700px) {
      .main {
        grid-template-columns: 1fr;
      }
      .wheel-wrap, #wheelCanvas {
        width: 290px;
        height: 290px;
      }
      .result-card {
        min-height: unset;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Ruleta de Comidas</h1>
    <p>Elegí tiempo y dificultad, después girá</p>
  </header>

  <div class="filters">
    <div class="filter-group">
      <label>Tiempo</label>
      <div class="pill-group" id="tiempoPills">
        <button class="pill active-tiempo" data-tiempo="30">30 min o menos</button>
        <button class="pill" data-tiempo="60">60 minutos</button>
        <button class="pill" data-tiempo="90">Más de 60 min</button>
      </div>
    </div>
    <div class="filter-group">
      <label>Dificultad</label>
      <div class="pill-group" id="dificultadPills">
        <button class="pill active-facil" data-dif="Fácil">Fácil</button>
        <button class="pill" data-dif="Medio">Medio</button>
        <button class="pill" data-dif="Difícil">Difícil</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="wheel-section">
      <div class="wheel-wrap">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="340" height="340"></canvas>
      </div>
      <button class="spin-btn" id="spinBtn">Girar</button>
    </div>

    <div class="result-card" id="resultCard">
      <span class="result-label">Resultado</span>
      <div class="result-placeholder" id="resultPlaceholder">
        <p>Girá la ruleta para descubrir tu próxima comida 🎲</p>
      </div>
    </div>
  </div>

  <script>
    const COMIDAS = [
      { nombre: "Tostadas con palta",    tiempo: 30, dificultad: "Fácil",   img: "images/tostadas-palta.jpg" },
      { nombre: "Ensalada césar",         tiempo: 30, dificultad: "Fácil",   img: "images/ensalada-cesar.jpg" },
      { nombre: "Tortilla española",      tiempo: 30, dificultad: "Fácil",   img: "images/tortilla-espanola.jpg" },
      { nombre: "Fideos con manteca",     tiempo: 30, dificultad: "Fácil",   img: "images/fideos-manteca.jpg" },
      { nombre: "Sándwich caprese",       tiempo: 30, dificultad: "Fácil",   img: "images/sandwich-caprese.jpg" },
      { nombre: "Milanesas al horno",     tiempo: 60, dificultad: "Fácil",   img: "images/milanesas-horno.jpg" },
      { nombre: "Arroz salteado",         tiempo: 60, dificultad: "Fácil",   img: "images/arroz-salteado.jpg" },
      { nombre: "Omelette relleno",       tiempo: 60, dificultad: "Fácil",   img: "images/omelette-relleno.jpg" },
      { nombre: "Sopa de tomate",         tiempo: 60, dificultad: "Fácil",   img: "images/sopa-tomate.jpg" },
      { nombre: "Pollo al limón",         tiempo: 60, dificultad: "Fácil",   img: "images/pollo-limon.jpg" },
      { nombre: "Guiso de lentejas",      tiempo: 90, dificultad: "Fácil",   img: "images/guiso-lentejas.jpg" },
      { nombre: "Pollo al horno entero",  tiempo: 90, dificultad: "Fácil",   img: "images/pollo-horno.jpg" },
      { nombre: "Estofado de verduras",   tiempo: 90, dificultad: "Fácil",   img: "images/estofado-verduras.jpg" },
      { nombre: "Fideos con boloñesa",    tiempo: 90, dificultad: "Fácil",   img: "images/fideos-bolonesa.jpg" },
      { nombre: "Arroz con leche",        tiempo: 90, dificultad: "Fácil",   img: "images/arroz-leche.jpg" },
      { nombre: "Wok de vegetales",       tiempo: 30, dificultad: "Medio",   img: "images/wok-vegetales.jpg" },
      { nombre: "Quesadillas de pollo",   tiempo: 30, dificultad: "Medio",   img: "images/quesadillas-pollo.jpg" },
      { nombre: "Croquetas de papa",      tiempo: 30, dificultad: "Medio",   img: "images/croquetas-papa.jpg" },
      { nombre: "Risotto exprés",         tiempo: 30, dificultad: "Medio",   img: "images/risotto-expres.jpg" },
      { nombre: "Burger casera",          tiempo: 30, dificultad: "Medio",   img: "images/burger-casera.jpg" },
      { nombre: "Lasaña de verduras",     tiempo: 60, dificultad: "Medio",   img: "images/lasana-verduras.jpg" },
      { nombre: "Empanadas al horno",     tiempo: 60, dificultad: "Medio",   img: "images/empanadas-horno.jpg" },
      { nombre: "Curry de pollo",         tiempo: 60, dificultad: "Medio",   img: "images/curry-pollo.jpg" },
      { nombre: "Ceviche clásico",        tiempo: 60, dificultad: "Medio",   img: "images/ceviche-clasico.jpg" },
      { nombre: "Gnocchi con salsa",      tiempo: 60, dificultad: "Medio",   img: "images/gnocchi-salsa.jpg" },
      { nombre: "Pulled pork",            tiempo: 90, dificultad: "Medio",   img: "images/pulled-pork.jpg" },
      { nombre: "Cazuela de mariscos",    tiempo: 90, dificultad: "Medio",   img: "images/cazuela-mariscos.jpg" },
      { nombre: "Canelones de ricota",    tiempo: 90, dificultad: "Medio",   img: "images/canelones-ricota.jpg" },
      { nombre: "Paella valenciana",      tiempo: 90, dificultad: "Medio",   img: "images/paella-valenciana.jpg" },
      { nombre: "Carne al vino tinto",    tiempo: 90, dificultad: "Medio",   img: "images/carne-vino.jpg" },
      { nombre: "Tempura crocante",       tiempo: 30, dificultad: "Difícil", img: "images/tempura-crocante.jpg" },
      { nombre: "Huevos benedictinos",    tiempo: 30, dificultad: "Difícil", img: "images/huevos-benedictinos.jpg" },
      { nombre: "Crepes flameados",       tiempo: 30, dificultad: "Difícil", img: "images/crepes-flameados.jpg" },
      { nombre: "Tataki de atún",         tiempo: 30, dificultad: "Difícil", img: "images/tataki-atun.jpg" },
      { nombre: "Emulsión de ajo negro",  tiempo: 30, dificultad: "Difícil", img: "images/emulsion-ajo.jpg" },
      { nombre: "Pasta fresca casera",    tiempo: 60, dificultad: "Difícil", img: "images/pasta-fresca.jpg" },
      { nombre: "Soufflé de queso",       tiempo: 60, dificultad: "Difícil", img: "images/souffle-queso.jpg" },
      { nombre: "Pechugas rellenas",      tiempo: 60, dificultad: "Difícil", img: "images/pechugas-rellenas.jpg" },
      { nombre: "Sushi rolls",            tiempo: 60, dificultad: "Difícil", img: "images/sushi-rolls.jpg" },
      { nombre: "Crème brûlée",           tiempo: 60, dificultad: "Difícil", img: "images/creme-brulee.jpg" },
      { nombre: "Asado de tira completo", tiempo: 90, dificultad: "Difícil", img: "images/asado-tira.jpg" },
      { nombre: "Croissants de manteca",  tiempo: 90, dificultad: "Difícil", img: "images/croissants-manteca.jpg" },
      { nombre: "Pato a la naranja",      tiempo: 90, dificultad: "Difícil", img: "images/pato-naranja.jpg" },
      { nombre: "Caldo dashi + ramen",    tiempo: 90, dificultad: "Difícil", img: "images/caldo-ramen.jpg" },
      { nombre: "Tarta tatín",            tiempo: 90, dificultad: "Difícil", img: "images/tarta-tatin.jpg" },
    ];

    const PALETAS = {
      "Fácil":   ["#5DCAA5","#9FE1CB","#1D9E75","#0F6E56","#3B6D11","#97C459","#C0DD97","#085041"],
      "Medio":   ["#EF9F27","#FAC775","#BA7517","#854F0B","#D85A30","#F0997B","#F5C4B3","#633806"],
      "Difícil": ["#E24B4A","#F09595","#A32D2D","#D4537E","#ED93B1","#F4C0D1","#993556","#791F1F"],
    };

    let selectedTiempo = 30;
    let selectedDif = "Fácil";
    let spinning = false;
    let currentAngle = 0;

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const size = canvas.width;
    const cx = size / 2, cy = size / 2, r = size / 2 - 4;

    function getFiltered() {
      return COMIDAS.filter(c => c.tiempo === selectedTiempo && c.dificultad === selectedDif);
    }

    function drawWheel(items, angle) {
      ctx.clearRect(0, 0, size, size);
      const palette = PALETAS[selectedDif] || PALETAS["Fácil"];

      if (!items.length) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = '#E5E5E0';
        ctx.fill();
        ctx.fillStyle = '#999';
        ctx.font = '14px DM Sans';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Sin resultados', cx, cy);
        return;
      }

      const arc = (2 * Math.PI) / items.length;

      items.forEach((item, i) => {
        const start = angle + i * arc;
        const end = start + arc;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();
        ctx.fillStyle = palette[i % palette.length];
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + arc / 2);
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';

        const fontSize = items.length > 8 ? 10 : 12;
        ctx.font = `${fontSize}px DM Sans`;
        ctx.fillStyle = 'rgba(0,0,0,0.72)';

        const maxW = r * 0.70;
        const text = item.nombre;
        const words = text.split(' ');
        if (ctx.measureText(text).width <= maxW || words.length === 1) {
          ctx.fillText(text, r - 14, 0);
        } else {
          const mid = Math.ceil(words.length / 2);
          ctx.fillText(words.slice(0, mid).join(' '), r - 14, -6);
          ctx.fillText(words.slice(mid).join(' '), r - 14, 6);
        }
        ctx.restore();
      });

      ctx.beginPath();
      ctx.arc(cx, cy, 24, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.10)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function getWinner(items, finalAngle) {
      if (!items.length) return null;
      const arc = (2 * Math.PI) / items.length;
      const pointer = -Math.PI / 2;
      let norm = ((pointer - finalAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
      return items[Math.floor(norm / arc) % items.length];
    }

    function showResult(comida) {
      const card = document.getElementById('resultCard');
      document.getElementById('resultPlaceholder').style.display = 'none';
      const old = card.querySelector('.result-body');
      if (old) old.remove();

      const tiempoLabel = comida.tiempo === 30 ? '30 min o menos' : comida.tiempo === 60 ? '60 minutos' : 'Más de 60 min';
      const difClass = comida.dificultad === 'Fácil' ? 'badge-facil' : comida.dificultad === 'Medio' ? 'badge-medio' : 'badge-dificil';

      const div = document.createElement('div');
      div.className = 'result-body';
      div.style.cssText = 'display:flex;flex-direction:column;gap:12px;';

      const imgEl = document.createElement('img');
      imgEl.className = 'result-img';
      imgEl.alt = comida.nombre;
      imgEl.src = comida.img;
      imgEl.onerror = function() {
        const fb = document.createElement('div');
        fb.className = 'img-fallback';
        fb.innerHTML = `<span>🍽️</span><span>Foto próximamente</span>`;
        this.replaceWith(fb);
      };

      const nameEl = document.createElement('div');
      nameEl.className = 'result-name';
      nameEl.textContent = comida.nombre;

      const badgesEl = document.createElement('div');
      badgesEl.className = 'badge-row';
      badgesEl.innerHTML = `
        <span class="badge ${difClass}">${comida.dificultad}</span>
        <span class="badge badge-tiempo">${tiempoLabel}</span>
      `;

      div.appendChild(imgEl);
      div.appendChild(nameEl);
      div.appendChild(badgesEl);
      card.appendChild(div);
    }

    function spin() {
      const items = getFiltered();
      if (!items.length || spinning) return;
      spinning = true;
      document.getElementById('spinBtn').disabled = true;

      const extra = Math.PI * 2 * (8 + Math.floor(Math.random() * 6));
      const target = currentAngle + extra + Math.random() * Math.PI * 2;
      const duration = 3800;
      const startAngle = currentAngle;
      const startTime = performance.now();

      function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

      function frame(now) {
        const t = Math.min((now - startTime) / duration, 1);
        currentAngle = startAngle + (target - startAngle) * easeOut(t);
        drawWheel(items, currentAngle);
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          currentAngle = target % (Math.PI * 2);
          spinning = false;
          document.getElementById('spinBtn').disabled = false;
          const winner = getWinner(items, currentAngle);
          if (winner) showResult(winner);
        }
      }
      requestAnimationFrame(frame);
    }

    function resetResult() {
      currentAngle = 0;
      document.getElementById('resultPlaceholder').style.display = '';
      const old = document.querySelector('.result-body');
      if (old) old.remove();
      drawWheel(getFiltered(), 0);
    }

    document.querySelectorAll('#tiempoPills .pill').forEach(p => {
      p.addEventListener('click', () => {
        selectedTiempo = parseInt(p.dataset.tiempo);
        document.querySelectorAll('#tiempoPills .pill').forEach(x => x.classList.remove('active-tiempo'));
        p.classList.add('active-tiempo');
        resetResult();
      });
    });

    document.querySelectorAll('#dificultadPills .pill').forEach(p => {
      p.addEventListener('click', () => {
        selectedDif = p.dataset.dif;
        document.querySelectorAll('#dificultadPills .pill').forEach(x => {
          x.classList.remove('active-facil','active-medio','active-dificil');
        });
        const cls = selectedDif === 'Fácil' ? 'active-facil' : selectedDif === 'Medio' ? 'active-medio' : 'active-dificil';
        p.classList.add(cls);
        resetResult();
      });
    });

    document.getElementById('spinBtn').addEventListener('click', spin);
    drawWheel(getFiltered(), 0);
  </script>
</body>
</html>
